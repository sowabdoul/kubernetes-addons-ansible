---
- name: Install Longhorn basic auth requirements
  ansible.builtin.pip:
    name:
      - passlib
    executable: pip3
    extra_args: "{{ '--break-system-packages' if (pip_version.stdout.split()[1] is version('23.0', '>=')) else '' }}"

- name: Create Longhorn Kubernetes namespace
  kubernetes.core.k8s:
    kubeconfig: /etc/kubernetes/admin.conf
    name: longhorn-system
    api_version: v1
    kind: Namespace
    state: present

- name: Create Longhorn htpasswd file
  community.general.htpasswd:
    path: "/home/{{ ansible_user }}/longhorn-passwdfile"
    name: "{{ longhorn_ui_admin_username }}"
    password: "{{ longhorn_ui_admin_password }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"

- name: Get Longhorn htpasswd file contents
  ansible.builtin.slurp:
    src: "/home/{{ ansible_user }}/longhorn-passwdfile"
  register: passwdfile

- name: Create longhorn basic auth secret
  kubernetes.core.k8s:
    kubeconfig: /etc/kubernetes/admin.conf
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: basic-auth
        namespace: longhorn-system
      type: Opaque
      data:
        auth: "{{ passwdfile.content }}"

- name: Install Container Storage Interface for Longhorn
  kubernetes.core.helm:
    kubeconfig: /etc/kubernetes/admin.conf
    chart_ref: longhorn
    chart_repo_url: https://charts.longhorn.io
    chart_version: "1.9.2"
    create_namespace: true
    release_name: longhorn-system
    release_namespace: longhorn-system
    release_state: present
    release_values:
      fullnameOverride: longhorn-system
      persistence:
        defaultClass: true
        defaultClassReplicaCount: "{{ longhorn_default_class_replica_count | default(2) }}"
        defaultDataLocality: "{{ longhorn_default_data_locality | default('best-effort') }}"
        defaultFsType: "xfs"
        volumeBindingMode: "WaitForFirstConsumer"
        migratable: true
        reclaimPolicy: "Retain"
        recurringJobSelector:
          enable: true
          jobList: '[{"name":"default", "isGroup":true}]'
      defaultSettings:
        defaultDataLocality: "{{ longhorn_default_data_locality | default('best-effort') }}"
        defaultDataPath: "{{ longhorn_mount_point }}"
        replicaAutoBalance: "{{ longhorn_replica_auto_balance | default('best-effort') }}"
        storageMinimalAvailablePercentage: 1
        storageReservedPercentageForDefaultDisk: 0
        autoCleanupSystemGeneratedSnapshot: true
        recurringJobSelectorEnabled: true
        recurringJobSelectorList: '[{"name":"default", "isGroup":true}]'
      recurringJobs:
        - name: "snapshot-delete"
          task: "snapshot-delete"
          cron: "0 1 * * *"
          retain: 5
          groups: ["default"]
        - name: "snapshot-cleanup"
          task: "snapshot-cleanup"
          cron: "0 2 * * *"
          retain: 0
          groups: ["default"]
        - name: "filesystem-trim"
          task: "filesystem-trim"
          cron: "0 3 * * *" 
          retain: 0
          groups: ["default"]
      longhornUI:
        replicas: "{{ longhorn_replica_ui | default(1) }}"
      longhornManager:
        tolerations: 
          {% if kubernetes_node_taints is defined %}
          - effect: NoSchedule
            key: sandbox
            operator: Equal
            value: "true"
          {% endif %}
          - effect: NoExecute
            key: node.kubernetes.io/not-ready
            operator: Exists
          - effect: NoExecute
            key: node.kubernetes.io/unreachable
            operator: Exists
      longhornDriver:
        tolerations: 
          {% if kubernetes_node_taints is defined %}
          - effect: NoSchedule
            key: sandbox
            operator: Equal
            value: "true"
          {% endif %}
          - effect: NoExecute
            key: node.kubernetes.io/not-ready
            operator: Exists
          - effect: NoExecute
            key: node.kubernetes.io/unreachable
            operator: Exists
      ingress:
        enabled: false
        ingressClassName: "nginx"
        host: "{{ longhorn_ui_domain }}"
        tls: true
        tlsSecret: "{{ longhorn_ui_domain }}-tls"
        path: /
        pathType: Prefix
        annotations:
          kubernetes.io/ingress.class: "nginx"
          cert-manager.io/cluster-issuer: "letsencrypt"
          nginx.ingress.kubernetes.io/auth-type: "basic"
          nginx.ingress.kubernetes.io/auth-secret: "basic-auth"
          nginx.ingress.kubernetes.io/auth-realm: "Authentication Required - Admin"

- name: Create ReadWriteMany Volume StorageClass
  kubernetes.core.k8s:
    kubeconfig: /etc/kubernetes/admin.conf
    state: present
    definition:
      kind: StorageClass
      apiVersion: storage.k8s.io/v1
      metadata:
        name: longhorn-rwx
      provisioner: driver.longhorn.io
      allowVolumeExpansion: true
      reclaimPolicy: Retain
      volumeBindingMode: Immediate
      parameters:
        migratable: "false"
        numberOfReplicas: "2"
        staleReplicaTimeout: "3600"
        fsType: "xfs"
        dataLocality: "best-effort"
        recurringJobSelector: '[{"name":"default", "isGroup":true}]'

- name: Setup Sandbox StorageClasses
  when: kubernetes_node_taints is defined
  block:
    - name: Create ReadWriteOnce Volume StorageClass for Sandbox
      kubernetes.core.k8s:
        kubeconfig: /etc/kubernetes/admin.conf
        state: present
        definition:
          kind: StorageClass
          apiVersion: storage.k8s.io/v1
          metadata:
            name: longhorn-sandbox
            annotations:
              storageclass.kubernetes.io/is-default-class: "false"
          provisioner: driver.longhorn.io
          allowVolumeExpansion: true
          reclaimPolicy: Retain
          volumeBindingMode: WaitForFirstConsumer
          parameters:
            numberOfReplicas: "1"
            staleReplicaTimeout: "3600"
            fsType: "xfs"
            dataLocality: "best-effort"
            nodeSelector: "sandbox"
            replicaAutoBalance: "best-effort"
            recurringJobSelector: '[{"name":"default", "isGroup":true}]'

    - name: Create ReadWriteMany Volume StorageClass for Sandbox
      kubernetes.core.k8s:
        kubeconfig: /etc/kubernetes/admin.conf
        state: present
        definition:
          kind: StorageClass
          apiVersion: storage.k8s.io/v1
          metadata:
            name: longhorn-rwx-sandbox
            annotations:
              storageclass.kubernetes.io/is-default-class: "false"
          provisioner: driver.longhorn.io
          allowVolumeExpansion: true
          reclaimPolicy: Retain
          volumeBindingMode: Immediate
          parameters:
            migratable: "false"
            numberOfReplicas: "1"
            staleReplicaTimeout: "3600"
            fsType: "xfs"
            dataLocality: "best-effort"
            nodeSelector: "sandbox"
            replicaAutoBalance: "best-effort"
            shareManagerNodeSelector: "environment: sandbox" 
            shareManagerTolerations: "sandbox=true:NoSchedule"
            recurringJobSelector: '[{"name":"default", "isGroup":true}]'

