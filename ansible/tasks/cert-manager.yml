---
- name: Install Cert-Manager chart
  kubernetes.core.helm:
    kubeconfig: /etc/kubernetes/admin.conf
    chart_ref: cert-manager
    chart_repo_url: https://charts.jetstack.io
    chart_version: "1.16.1"
    create_namespace: true
    release_name: cert-manager
    release_namespace: cert-manager
    release_state: present
    release_values:
      fullnameOverride: cert-manager
      crds:
        enabled: true
        keep: true
      replicaCount: 2
      prometheus:
        enabled: false
      webhook:
        timeoutSeconds: 30

- name: Create Let's Encrypt Cluster Issuer
  kubernetes.core.k8s:
    kubeconfig: /etc/kubernetes/admin.conf
    state: present
    definition:
      apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      metadata:
        name: letsencrypt
      spec:
        acme:
          # The ACME server URL
          #https://acme-v02.api.letsencrypt.org/directory
          server: "{{ cert_manager_cluster_issuer_acme_server | default('https://acme-staging-v02.api.letsencrypt.org/directory') }}"
          # Email address used for ACME registration
          email: "{{ cert_manager_cluster_issuer_acme_email | default('support@aynid.io') }}"
          # Name of a secret used to store the ACME account private key
          privateKeySecretRef:
            name: letsencrypt
          # Enable the HTTP-01 challenge provider
          solvers:
            - http01:
                ingress:
                  ingressClassName: nginx

- name: Get linux architecture
  ansible.builtin.command: dpkg --print-architecture
  register: linux_architecture_register

- name: Set linux architecture
  ansible.builtin.set_fact:
    linux_architecture: "{{ linux_architecture_register.stdout }}"

- name: Install cert-manager as Kubectl plugin
  ansible.builtin.unarchive:
    src: "https://github.com/cert-manager/cert-manager/releases/download/{{ cert_manager_kubectl_plugin_version | default('v1.6.3') }}/kubectl-cert_manager-linux-{{ linux_architecture }}.tar.gz"
    dest: "/usr/local/bin"
    remote_src: true
    mode: "0755"
